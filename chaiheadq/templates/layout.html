{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Little Tweeter - A modern social networking platform">
    
    <!-- Bootstrap CSS for grid system -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    <title>
        {% block title %}Little Tweeter{% endblock %}
    </title>
</head>
<body>
    <!-- Glassmorphism Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav mb-5">
        <div class="container">
            <a class="navbar-brand" href="{% url 'tweet_list' %}">Little Tweeter</a>
            
            <button class="navbar-toggler custom-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'tweet_list' %}">Home</a>
                    </li>
                </ul>
                
                <form class="d-flex me-3" role="search" method="GET" action="{% url 'tweet_list' %}">
                    <input class="form-control glass-input me-2" type="search" placeholder="Search tweets..." aria-label="Search" name="q" value="{{ request.GET.q|default:'' }}">
                    <button class="btn btn-glass" type="submit">Search</button>
                </form>

                <div class="d-flex align-items-center gap-2">
                    {% if user.is_authenticated %}
                        <form method="post" action="{% url 'logout' %}" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-glass">Logout ({{ user.username }})</button>
                        </form>
                    {% else %}
                        <a href="{% url 'login' %}" class="btn btn-glass">Login</a>
                        <a href="{% url 'register' %}" class="btn btn-gradient">Register</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        {% block content %}  
        {% endblock %}
    </main>

    <!-- Bootstrap JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
