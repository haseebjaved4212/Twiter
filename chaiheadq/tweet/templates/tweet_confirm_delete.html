{% extends 'layout.html' %}
{% block title %}Delete Tweet - Little Tweeter{% endblock %}

{% block content %}
<div class="feed-container py-5 text-center">
    <div class="glass-panel p-5 mt-4 border-danger">
        <h2 class="mb-4 text-gradient">Delete Tweet</h2>
        <p class="text-secondary mb-5 fs-5">Are you sure you want to delete this tweet? This action cannot be undone.</p>
        
        <form method="post" class="d-flex justify-content-center gap-3">
            {% csrf_token %}
            <a href="{% url 'tweet_list' %}" class="btn btn-glass px-4">Cancel</a>
            <button class="btn btn-danger px-5" style="border-radius: 50px; font-weight: 600;" type="submit">Delete Permanently</button>
        </form>
    </div>
</div>
{% endblock %}
