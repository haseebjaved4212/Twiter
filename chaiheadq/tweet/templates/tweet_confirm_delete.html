{% extends 'layout.html' %}
{% block title %}Little Tweeter{% endblock %}

{%block content%}
    <h1 class="mt-5">Are you sure you want to delete this tweet?</h1>
    <form method="post" >
        {%csrf_token%}
        <button type="submit" class="btn btn-danger m-2">Delete</button>
        <a href="{%url 'tweet_list'%}" class="btn btn-success">Cancel</a>
    </form>
{%endblock%}
