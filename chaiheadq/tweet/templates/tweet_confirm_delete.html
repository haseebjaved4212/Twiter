{% extends 'layout.html' %}
{% block title %}Little Tweeter{% endblock %}

{%block content%}
    <h1 class=" text-center mt-5">Are you sure you want to delete this tweet?</h1>
    <form method="post" class="d-flex justify-content-center">
        {%csrf_token%}
        <button class="btn btn-danger m-2">Delete</button>
        <a href="{%url 'tweet_list'%}" class="btn btn-success mt-2">Cancel</a>
    </form>
{%endblock%}
